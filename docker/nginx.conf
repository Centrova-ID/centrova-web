server {
    listen 80;
    server_name centrova.id *.centrova.id localhost;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 50M;

    # Trust Cloudflare as proxy — pass real visitor IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Force HTTPS scheme when behind Cloudflare
    set $scheme_actual $scheme;
    if ($http_x_forwarded_proto = "https") {
        set $scheme_actual "https";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Glide image manipulation — route to Laravel first (^~ prevents regex override)
    location ^~ /img/ {
        try_files $uri /index.php?$query_string;

        # Hapus cookie untuk gambar agar cache Cloudflare maksimal
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Set-Cookie "";
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS $scheme_actual;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location ~ /\.ht { deny all; }
    location ~ /\.env { deny all; }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}
